name: npm release

on:
  push:
    branches:
      - 'main'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: github action checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: use Node 20
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Release
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn semantic-release
